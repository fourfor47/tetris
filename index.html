<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>俄罗斯方块 - Tetris</title>
    <style>
        body {
            background: #202028;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        #game-container {
            position: relative;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas { display: block; background: #000; }
        #score-board {
            margin-top: 15px;
            font-size: 20px;
            text-align: center;
        }
        #controls {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }
        #touch-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }
        .row { display: flex; gap: 8px; }
        .btn {
            width: 60px;
            height: 60px;
            font-size: 24px;
            background: #444;
            color: white;
            border: 2px solid #666;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn:active { background: #666; }
        #start-btn {
            margin-top: 15px;
            padding: 12px 24px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #start-btn:hover { background: #45a049; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>俄罗斯方块</h1>
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>
    <div id="score-board">分数：<span id="score">0</span></div>
    <div id="controls">
        ← → : 移动 | ↑ : 旋转 | ↓ : 加速
    </div>
    <button id="start-btn" onclick="startGame()">开始游戏</button>

    <!-- 触摸控制按钮 -->
    <div id="touch-controls" class="hidden">
        <div class="row">
            <button class="btn" id="btn-up">↑</button>
        </div>
        <div class="row">
            <button class="btn" id="btn-left">←</button>
            <button class="btn" id="btn-down">↓</button>
            <button class="btn" id="btn-right">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const touchControls = document.getElementById('touch-controls');

        // 缩放 20 倍（每个方块 20x20 像素）
        context.scale(20, 20);

        // 方块形状和颜色
        const pieces = 'ILJOTSZ';
        const colors = [
            null,
            '#FF0D72', // T
            '#0DC2FF', // O
            '#0DFF72', // L
            '#F538FF', // J
            '#FF8E0D', // I
            '#3877FF', // S
            '#FF3838', // Z
        ];

        // 创建方块矩阵
        function createPiece(type) {
            if (type === 'I') {
                return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            } else if (type === 'L') {
                return [[0,2,0],[0,2,0],[0,2,2]];
            } else if (type === 'J') {
                return [[0,3,0],[0,3,0],[3,3,0]];
            } else if (type === 'O') {
                return [[4,4],[4,4]];
            } else if (type === 'Z') {
                return [[5,5,0],[0,5,5],[0,0,0]];
            } else if (type === 'S') {
                return [[0,6,6],[6,6,0],[0,0,0]];
            } else if (type === 'T') {
                return [[0,7,0],[7,7,7],[0,0,0]];
            }
        }

        // 创建场地
        function createMatrix(w, h) {
            const matrix = [];
            for (let i = 0; i < h; i++) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // 碰撞检测
        function collide(arena, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                        (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 绘制
        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // 合并方块到场地
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 旋转
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // 玩家下落（一次一格）
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0; // 重置计数器
        }

        // 玩家移动
        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            }
        }

        // 重置玩家方块
        function playerReset() {
            const piecesStr = 'ILJOTSZ';
            player.matrix = createPiece(piecesStr[Math.floor(Math.random() * piecesStr.length)]);
            player.pos.y = 0;
            player.pos.x = Math.floor(arena[0].length / 2) - Math.floor(player.matrix[0].length / 2);
            
            if (collide(arena, player)) {
                // 游戏结束
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
                alert("游戏结束！得分：" + player.score);
                isPaused = true;
                startBtn.classList.remove('hidden');
                startBtn.innerText = "重新开始";
                touchControls.classList.add('hidden');
            }
        }

        // 玩家旋转
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // 扫行（消除）
        function arenaSweep() {
            let rowCount = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                arena.splice(y, 1)[0].fill(0);
                arena.unshift(new Array(arena[0].length).fill(0));
                ++y;
                rowCount++;
            }
            if (rowCount > 0) {
                player.score += rowCount * 10;
                // 每消除 3 行速度稍快，最低 200ms
                dropInterval = Math.max(200, 1500 - Math.floor(player.score / 3) * 100);
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        // 游戏状态
        let dropCounter = 0;
        let dropInterval = 1500; // 初始 1.5 秒（更友好）
        let lastTime = 0;
        let isPaused = true;

        // 游戏循环
        function update(time = 0) {
            if (isPaused) return;

            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop(); // 这里只调用一次，不再递归
            }
            draw();
            requestAnimationFrame(update);
        }

        // 场地和玩家
        const arena = createMatrix(12, 20);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        // 开始游戏
        function startGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            updateScore();
            playerReset();
            isPaused = false;
            startBtn.classList.add('hidden');
            touchControls.classList.remove('hidden'); // 显示触摸按钮
            update();
        }

        // 键盘控制
        document.addEventListener('keydown', event => {
            if (isPaused) return;
            if (event.keyCode === 37) { // Left
                playerMove(-1);
            } else if (event.keyCode === 39) { // Right
                playerMove(1);
            } else if (event.keyCode === 40) { // Down
                playerDrop();
            } else if (event.keyCode === 38) { // Up (Rotate)
                playerRotate(1);
            }
        });

        // 触摸按钮控制
        document.getElementById('btn-left').addEventListener('click', () => { if (!isPaused) playerMove(-1); });
        document.getElementById('btn-right').addEventListener('click', () => { if (!isPaused) playerMove(1); });
        document.getElementById('btn-down').addEventListener('click', () => { if (!isPaused) playerDrop(); });
        document.getElementById('btn-up').addEventListener('click', () => { if (!isPaused) playerRotate(1); });

        // 初始绘制
        draw();
    </script>
</body>
</html>
